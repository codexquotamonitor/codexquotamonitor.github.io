  <!-- Arc segments (original, unchanged) -->
  <!--
    Ticks igualmente espaçados.
    O arco cobre de 210° a 330° (sistema matemático, onde 0°=direita, anti-horário).
    Em SVG (0°=direita, horário): 210° SVG = parte inferior-esquerda.
    
    O arco original vai de ~-150° a ~-30° (em relação ao centro 627,675),
    ou seja, de 210° a 330° no sistema SVG (horário, 0°=direita).
    
    8 ticks nos extremos + intermediários: ângulos de 210° a 330° em steps de 120/7 ≈ 17.14°
    Raio do arco interno ≈ 297 (365-68), externo ≈ 365.
    Ticks de r=330 até r=365 (35px comprimento), centro em 627,675.
    
    Ângulos (SVG, graus): 210, 227.14, 244.29, 261.43, 278.57, 295.71, 312.86, 330
    Para cada ângulo a (graus):
      x1 = 627 + 330*cos(a*π/180)
      y1 = 675 + 330*sin(a*π/180)
      x2 = 627 + 368*cos(a*π/180)
      y2 = 675 + 368*sin(a*π/180)
    
    Calculados:
    210°: cos=-0.866, sin=-0.5  → x1=627-285.8=341.2, y1=675-165=510   | x2=627-318.9=308.1, y2=675-184=491
    227.14°: cos=-0.6819, sin=-0.7314 → x1=627-225=402, y1=675-241.4=433.6 | x2=627-251.3=375.7, y2=675-269.2=405.8
    244.29°: cos=-0.4337, sin=-0.9010 → x1=627-143.1=483.9, y1=675-297.3=377.7 | x2=627-159.8=467.2, y2=675-331.6=343.4
    261.43°: cos=-0.1495, sin=-0.9888 → x1=627-49.3=577.7, y1=675-326.3=348.7 | x2=627-55.1=571.9, y2=675-363.9=311.1
    278.57°: cos=0.1495, sin=-0.9888  → x1=627+49.3=676.3, y1=675-326.3=348.7 | x2=627+55.1=682.1, y2=675-363.9=311.1
    295.71°: cos=0.4337, sin=-0.9010  → x1=627+143.1=770.1, y1=675-297.3=377.7 | x2=627+159.8=786.8, y2=675-331.6=343.4
    312.86°: cos=0.6819, sin=-0.7314  → x1=627+225=852, y1=675-241.4=433.6 | x2=627+251.3=878.3, y2=675-269.2=405.8
    330°: cos=0.866, sin=-0.5         → x1=627+285.8=912.8, y1=675-165=510 | x2=627+318.9=945.9, y2=675-184=491
  -->
  <!--
    Ponteiro: ponta fina aponta para o arco (zona laranja ~300°), base larga no centro.
    Rotação 60° a partir de 210° = 270° (topo). Quero laranja: ~300° no SVG.
    
    Triângulo: base na origem (cx=627, cy=675), ponta em (0, -255) antes da rotação.
    Base: dois pontos a ±12px do centro. Ponta: (0, -255) relativo ao centro.
    Depois rotate(300-270=30... mas 300° SVG horário = 30° a direita do topo).
    
    No meu sistema: ângulo 300° SVG = rotate(300, 627, 675) aplicado a um ponto (627, 675-255)=(627,420).
    
    Base do triângulo em (627±14, 675), ponta em (627, 420) → rotate 30° horário em torno de (627,675):
    Depois rotate(30, 627, 675):
  -->
  <!-- Centro -->
  <!-- Símbolo </> -->
